<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кроссворды</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">К</div>
    <div class="titles"><h1>Кроссворды</h1><p>Свежий кроссворд по одному нажатию</p></div>
  </header>

  <div class="setup">
    <div class="field"><label>Тема</label><select id="themeSel"></select></div>
    <div class="field"><label>Размер</label>
      <select id="sizeSel">
        <option value="small">Маленький</option>
        <option value="medium" selected>Средний</option>
        <option value="large">Большой</option>
      </select>
    </div>
    <button class="newbtn" id="newBtn">✦ Новый кроссворд</button>
  </div>

  <div class="cluebar">
    <button class="nav" id="prevW" aria-label="Предыдущее">‹</button>
    <div class="txt"><div class="tag" id="clueTag">по горизонтали</div><div class="ct" id="clueText">—</div></div>
    <button class="nav" id="nextW" aria-label="Следующее">›</button>
  </div>

  <div class="main">
    <div class="left">
      <div class="gridwrap"><div class="grid" id="grid"></div>
        <div class="loading" id="loading"><div class="spinner"></div><div>Собираю кроссворд…</div></div>
      </div>
      <div class="controls">
        <button class="btn primary" id="checkBtn">Проверить</button>
        <button class="btn" id="hintBtn">Открыть букву</button>
        <button class="btn ghost" id="clearBtn" title="Очистить" aria-label="Очистить">⟲</button>
      </div>
      <div class="progress" id="progress"></div>
      <div class="hint">Нажмите на клетку и печатайте. Повторное нажатие меняет направление.</div>
    </div>
    <div class="right" id="cluePanel"></div>
  </div>

  <div class="mobileclues" id="mobileClues"></div>
</div>

<input id="hidden" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" aria-hidden="true">
<div class="confetti" id="confetti"></div>
<div class="win" id="win"><div class="wincard"><div style="font-size:32px">🎉</div>
  <h2>Кроссворд разгадан!</h2><p id="winText"></p>
  <button class="btn primary" id="winNew" style="width:100%;margin-bottom:8px">Следующий кроссворд</button>
  <button class="btn" id="winClose" style="width:100%">Закрыть</button></div></div>


<script src="crossword.js"></script>
<script src="scanword.js"></script>
<script src="dictionary.js"></script>
<script src="app.js"></script>
</body>
</html>
